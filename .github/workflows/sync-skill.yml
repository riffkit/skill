name: sync-skill

# Keep skill.md in this repo mirrored to the live, canonical
# https://riffkit.ai/skill.md (the single source of truth, served from the
# Riffkit app). Runs daily + on-demand. The agent always reads the live URL,
# so this mirror is for human browsing / GitHub discovery and never blocks use.

on:
  schedule:
    - cron: "0 6 * * *" # daily ~06:00 UTC
  workflow_dispatch: {} # manual "Run workflow" button (e.g. right after a deploy)

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pull live skill files
        run: |
          curl -fsSL https://riffkit.ai/skill.md     -o SKILL.md
          curl -fsSL https://riffkit.ai/heartbeat.md -o heartbeat.md
          curl -fsSL https://riffkit.ai/skill.json   -o skill.json
      - name: Commit if changed
        run: |
          if ! git diff --quiet; then
            git config user.name "riffkit-bot"
            git config user.email "bot@riffkit.ai"
            git add SKILL.md heartbeat.md skill.json
            git commit -m "chore: sync skill.md / heartbeat.md / skill.json from riffkit.ai"
            git push
          else
            echo "Already up to date."
          fi
